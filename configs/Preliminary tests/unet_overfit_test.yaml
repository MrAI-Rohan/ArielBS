experiment_name: unet_overfit_test-1
seed: 42
precision: 16
platform: colab

model:
  name: unet
  encoder: resnet34
  pretrained: true

data:
  dataset: whu
  patch_size: 256
  train_batch_size: 2
  val_batch_size: 2
  samples_per_epoch: 4
  train_transform: false
  val_transform: false
  shuffle: false

training:
  epochs: 50
  lr: 1e-3
  progress_bar: false

optimizer:
  name: radam
  params:
    weight_decay: 0.0001

scheduler:
  name: reduce_on_plateau
  params:
    factor: 0.2
    patience: 5
    mode: max
  monitor: val_iou

loss:
  name: bce_dice

logging:
  project: ArielBS