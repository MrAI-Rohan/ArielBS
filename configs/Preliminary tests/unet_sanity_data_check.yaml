# Check if making dataset fast access makes a difference in training time for 1 epoch.

experiment_name: unet_sanity_data_check
seed: 42
precision: 16
platform: colab

model:
  name: unet
  encoder: resnet34
  pretrained: true

data:
  dataset: whu
  patch_size: 256
  train_batch_size: 32
  val_batch_size: 16
  samples_per_epoch: 6000
  train_transform:
    hflip: 0.5
    vflip: 0.5
    rotate90: 0.5
    brightness_contrast: 0.3
    gauss_noise: 0.2
  val_transform: false
  shuffle: true
  data_dir: /content/whu-building-dataset/WHU

training:
  epochs: 1
  lr: 1e-4
  progress_bar: false

optimizer:
  name: radam
  params:
    weight_decay: 0.0001

scheduler:
  name: reduce_on_plateau
  params:
    factor: 0.2
    patience: 5
    mode: max
  monitor: val_iou

loss:
  name: bce_dice

logging:
  project: ArielBS
