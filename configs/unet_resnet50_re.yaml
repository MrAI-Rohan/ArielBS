# Test if Resnet50 encoder with pretrained weights can achieve good performance on the reproduction dataset.

experiment_name: unet_resnet50_re
seed: 42
precision: 16
platform: colab

model:
  name: unet
  encoder: resnet50
  pretrained: true

data:
  dataset: reproduction
  patch_size: 224
  train_batch_size: 64
  val_batch_size: 128
  train_transform:
    resize: true
    hflip: 0.5
    vflip: 0.5
    rotate90: 0.5
    brightness_contrast: 0.3
    gauss_noise: 0.2
  val_transform:
    resize: true
  shuffle: true

training:
  epochs: 150
  encoder_lr: 1e-4
  decoder_lr: 1e-4
  progress_bar: false

early_stopping:
  monitor: val_iou
  patience: 30
  mode: max

optimizer:
  name: radam
  params:
    weight_decay: 0.0001

scheduler:
  name: reduce_on_plateau
  params:
    factor: 0.5
    patience: 10
    mode: max
    min_lr: 1e-6
  monitor: val_iou

loss:
  name: bce_dice

logging:
  project: ArielBS
