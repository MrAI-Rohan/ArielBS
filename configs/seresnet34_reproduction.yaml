# Reproducing paper results.

experiment_name: seresnet34_reproduction
seed: 42
precision: 16
platform: colab

model:
  name: unet
  encoder: tu-seresnet34

data:
  dataset: reproduction
  patch_size: 224
  train_batch_size: 64
  val_batch_size: 128
  train_transform:
    resize: true
    hflip: 0.5
    vflip: 0.5
    rotate90: 0.5
    gauss_noise: 0.3
  val_transform:
    resize: true
  shuffle: true

training:
  epochs: 150
  encoder_lr: 0.005
  decoder_lr: 0.005
  progress_bar: false
  gradient_clip_val: 0

early_stopping: false

optimizer:
  name: radam
  params:
    weight_decay: 0.0001

scheduler:
  name: reduce_on_plateau
  params:
    factor: 0.2
    patience: 5
    mode: max
    min_lr: 0
  monitor: val_iou

loss:
  name: bce_dice

logging:
  project: ArielBS
