# Set different learning rates for encoder and decoder in UNet with ResNet34 backbone.

experiment_name: unet_resnet34_diff_decoder_lr
seed: 42
precision: 16
platform: colab

model:
  name: unet
  encoder: resnet34
  pretrained: true

data:
  dataset: whu
  patch_size: 256
  train_batch_size: 64
  val_batch_size: 128
  samples_per_epoch: 8000
  train_transform:
    hflip: 0.5
    vflip: 0.5
    rotate90: 0.5
    brightness_contrast: 0.3
    gauss_noise: 0.2
  val_transform: false
  shuffle: true

training:
  epochs: 150
  encoder_lr: 1e-4
  decoder_lr: 3e-4
  progress_bar: false

early_stopping:
  monitor: val_iou
  patience: 20
  mode: max

optimizer:
  name: radam
  params:
    weight_decay: 0.0001

scheduler:
  name: reduce_on_plateau
  params:
    factor: 0.2
    patience: 5
    mode: max
  monitor: val_iou

loss:
  name: bce_dice

logging:
  project: ArielBS
